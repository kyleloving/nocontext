<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoContext — MCP Server Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0e14;
      --surface:   #141720;
      --surface2:  #1a1d2b;
      --border:    #242736;
      --text:      #f0f4f8;
      --muted:     #5a6480;
      --muted2:    #8892a4;
      --up:        #22c55e;
      --degraded:  #f59e0b;
      --down:      #ef4444;
      --accent:    #818cf8;
      --radius:    12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 0 1rem 5rem;
      /* subtle radial glow from top */
      background-image: radial-gradient(ellipse 80% 40% at 50% -10%, #1a1d3a55, transparent);
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* ── Hero ───────────────────────────────────────────────────── */
    .hero {
      padding: 3.5rem 0 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1rem;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .wordmark {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .wordmark .no  { color: var(--text); }
    .wordmark .ctx { color: var(--accent); }

    .tagline {
      font-size: 0.85rem;
      color: var(--muted2);
      margin-top: 0.35rem;
      letter-spacing: 0.01em;
    }

    /* Overall status pill */
    .overall {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid;
      white-space: nowrap;
    }
    .overall.all-up    { color: var(--up);      border-color: #16a34a80; background: #052e1630; }
    .overall.some-down { color: var(--down);    border-color: #b91c1c80; background: #450a0a30; }
    .overall.degraded  { color: var(--degraded);border-color: #b4530080; background: #431a0230; }

    .pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .pip.pulse { animation: pulse 2s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    /* ── Stats row ───────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }
    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--muted2);
      margin-top: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    /* ── Meta / last-checked ────────────────────────────────────── */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .meta { font-size: 0.78rem; color: var(--muted); }

    /* ── Tag filter ─────────────────────────────────────────────── */
    .tag-filter { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem; }
    .tag-btn {
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted2);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .tag-btn:hover  { border-color: var(--accent); color: var(--accent); }
    .tag-btn.active { border-color: var(--accent); color: var(--accent); background: #818cf810; }

    /* ── Search ─────────────────────────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.6rem 0.85rem 0.6rem 2.4rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    /* ── Server cards ───────────────────────────────────────────── */
    .server-list { display: flex; flex-direction: column; gap: 0.6rem; }

    .server-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }
    .server-card:hover { background: var(--surface2); }
    .server-card.up       { border-left-color: var(--up); }
    .server-card.degraded { border-left-color: var(--degraded); }
    .server-card.down     { border-left-color: var(--down); }

    .card-top {
      display: grid;
      grid-template-columns: 10px 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem 0.85rem;
    }

    .status-pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-pip.up       { background: var(--up);       animation: pulse 2.5s ease-in-out infinite; }
    .status-pip.degraded { background: var(--degraded); }
    .status-pip.down     { background: var(--down); }
    .status-pip.unknown  { background: var(--muted); }

    .server-info { min-width: 0; }
    .server-name {
      font-weight: 600;
      font-size: 0.92rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .server-url {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .server-url a { color: inherit; text-decoration: none; }
    .server-url a:hover { color: var(--accent); }

    .server-tags { display: flex; gap: 0.3rem; margin-top: 0.45rem; flex-wrap: wrap; }
    .tag {
      font-size: 0.63rem;
      font-weight: 500;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted2);
    }
    .transport-tag { color: var(--accent); border-color: #818cf840; background: #818cf810; }

    .server-stats { text-align: right; flex-shrink: 0; }
    .latency {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .uptime-pct  { font-size: 0.7rem; color: var(--muted2); margin-top: 0.2rem; }
    .error-txt   { font-size: 0.7rem; color: var(--down);   margin-top: 0.2rem; max-width: 150px; }
    .note-txt    { font-size: 0.7rem; color: var(--muted2); margin-top: 0.2rem; }

    /* ── Tools section ──────────────────────────────────────────── */
    .tool-count {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: var(--accent);
      background: #818cf810;
      border: 1px solid #818cf830;
      padding: 0.1rem 0.55rem;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      user-select: none;
      transition: background 0.15s;
      margin-top: 0.2rem;
    }
    .tool-count:hover { background: #818cf820; }
    .tool-count .chev { font-size: 0.55rem; transition: transform 0.15s; }
    .tool-count.open .chev { transform: rotate(90deg); }

    .tools-panel {
      display: none;
      padding: 0.75rem 1.25rem 1rem;
      border-top: 1px solid var(--border);
      background: #10131c;
    }
    .tools-panel.open { display: block; }

    .tools-search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.78rem;
      padding: 0.4rem 0.65rem;
      outline: none;
      margin-bottom: 0.65rem;
    }
    .tools-search:focus { border-color: var(--accent); }

    .tool-item {
      padding: 0.5rem 0.65rem;
      border-radius: var(--radius-sm);
      margin-bottom: 0.3rem;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .tool-item:last-child { margin-bottom: 0; }
    .tool-name {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
    }
    .tool-desc {
      font-size: 0.73rem;
      color: var(--muted2);
      margin-top: 0.2rem;
      line-height: 1.45;
    }
    .tools-empty {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding: 0.5rem;
    }

    /* ── Sparkline ──────────────────────────────────────────────── */
    .sparkline-row {
      padding: 0 1.25rem 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 0.1rem;
      padding-top: 0.6rem;
    }

    .sparkline-wrap { display: flex; align-items: flex-end; gap: 0.6rem; }

    .sparkline {
      display: flex;
      gap: 2px;
      flex: 1;
      height: 32px;
      align-items: flex-end;
    }

    .spark-bar {
      flex: 1;
      border-radius: 2px 2px 0 0;
      cursor: default;
      min-width: 2px;
      opacity: 0.85;
      transition: opacity 0.1s;
    }
    .spark-bar:hover  { opacity: 1; }
    .spark-bar.up       { background: var(--up); }
    .spark-bar.degraded { background: var(--degraded); }
    .spark-bar.down     { background: var(--down); }
    .spark-bar.unknown  { background: var(--border); }

    .spark-label { font-size: 0.65rem; color: var(--muted); white-space: nowrap; min-width: 54px; text-align: right; }

    /* ── Tooltip ────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: #0d0f1a;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.45rem 0.8rem;
      font-size: 0.74rem;
      color: var(--text);
      pointer-events: none;
      z-index: 9999;
      display: none;
      white-space: nowrap;
      box-shadow: 0 8px 24px #00000080;
    }

    /* ── Divider ────────────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 2.5rem 0 1rem;
    }
    .section-header h2 {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }
    .section-header::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Incidents ──────────────────────────────────────────────── */
    .incident-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .incident-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1.1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
    }
    .incident-item.ongoing  { border-left: 3px solid var(--down); }
    .incident-item.resolved { opacity: 0.6; }

    .incident-server { font-weight: 600; font-size: 0.85rem; }
    .incident-time   { font-size: 0.73rem; color: var(--muted2); margin-top: 0.25rem; }

    .incident-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      border: 1px solid;
      white-space: nowrap;
    }
    .incident-badge.ongoing  { color: var(--down);  border-color: #b91c1c60; background: #450a0a30; }
    .incident-badge.resolved { color: var(--muted2); border-color: var(--border); background: transparent; }

    .all-clear {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: var(--up);
      padding: 0.75rem 1rem;
      background: #052e1620;
      border: 1px solid #16a34a40;
      border-radius: var(--radius);
    }

    .no-incidents { font-size: 0.85rem; color: var(--muted); }

    details.past-incidents { margin-top: 1rem; }
    details.past-incidents summary {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      user-select: none;
    }
    details.past-incidents summary::-webkit-details-marker { display: none; }
    details.past-incidents summary::before {
      content: "▸";
      font-size: 0.65rem;
      transition: transform 0.15s;
      display: inline-block;
    }
    details.past-incidents[open] summary::before { transform: rotate(90deg); }
    details.past-incidents .incident-list { margin-top: 0.75rem; }

    /* ── Loading / error ────────────────────────────────────────── */
    #loading, #error-msg { text-align: center; padding: 5rem; color: var(--muted); }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      margin-top: 3.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    footer a { color: var(--muted2); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-card:last-child { grid-column: span 2; }
      .wordmark { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div id="tooltip"></div>
<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-top">
      <div>
        <div class="wordmark"><span class="no">No</span><span class="ctx">Context</span></div>
        <div class="tagline">Uptime, latency, and live tool catalogs for public MCP servers.</div>
      </div>
      <div class="overall" id="overall-badge" style="display:none"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-card">
      <div class="stat-value" id="stat-up">—</div>
      <div class="stat-label">Servers online</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-uptime">—</div>
      <div class="stat-label">Avg uptime (90 checks)</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-incidents">—</div>
      <div class="stat-label">Open incidents</div>
    </div>
  </div>

  <!-- Meta + filter -->
  <div class="meta-row">
    <p class="meta" id="meta-line">Loading&hellip;</p>
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="search" placeholder="Search servers…" autocomplete="off" />
  </div>

  <div class="tag-filter" id="tag-filter"></div>

  <div id="loading">Fetching status&hellip;</div>
  <div id="error-msg" style="display:none">Failed to load status data.</div>
  <div id="server-list" class="server-list" style="display:none"></div>

  <!-- Incidents -->
  <div id="incidents-section" style="display:none">
    <div class="section-header"><h2>Current Outages</h2></div>
    <div id="ongoing-list"></div>
    <details class="past-incidents" id="past-incidents" style="display:none">
      <summary>Past incidents</summary>
      <div class="incident-list" id="resolved-list"></div>
    </details>
  </div>

  <footer>
    <span>Checks run every 15&nbsp;min via GitHub Actions</span>
    <a href="https://github.com/kyleloving/nocontext" target="_blank" rel="noopener">View source on GitHub &rarr;</a>
  </footer>

</div>

<script>
const STATUS_URL    = "./data/status.json";
const INCIDENTS_URL = "./data/incidents.json";
const TOOLS_URL     = "./data/tools.json";

const tooltip = document.getElementById("tooltip");

// ── Helpers ──────────────────────────────────────────────────────

function latencyStyle(ms) {
  if (ms == null) return "";
  if (ms < 300)  return "color:var(--up)";
  if (ms < 800)  return "color:var(--degraded)";
  return "color:var(--down)";
}

function fmtDatetime(iso) {
  try { return new Date(iso).toLocaleString(undefined, { dateStyle:"medium", timeStyle:"short" }); }
  catch { return iso; }
}

function timeAgo(iso) {
  const s = Math.round((Date.now() - new Date(iso)) / 1000);
  if (s < 60)    return `${s}s ago`;
  if (s < 3600)  return `${Math.round(s/60)}m ago`;
  if (s < 86400) return `${Math.round(s/3600)}h ago`;
  return `${Math.round(s/86400)}d ago`;
}

function fmtDuration(min) {
  if (min == null) return "";
  if (min < 60) return `${min}m`;
  return `${Math.round(min / 60 * 10) / 10}h`;
}

// ── Stats ─────────────────────────────────────────────────────────

function renderStats(servers, incidents) {
  const total   = servers.length;
  const upCount = servers.filter(s => s.status === "up").length;
  const avgUp   = total
    ? Math.round(servers.reduce((a, s) => a + (s.uptime_90 ?? 0), 0) / total * 10) / 10
    : 0;
  // Only count incidents for servers still present in the config — old entries
  // from renamed/removed servers are ignored.
  const currentNames = new Set(servers.map(s => s.name));
  const openInc = Object.entries(incidents)
    .filter(([name]) => currentNames.has(name))
    .flatMap(([, list]) => list)
    .filter(i => !i.resolved_at).length;

  document.getElementById("stat-up").textContent       = `${upCount} / ${total}`;
  document.getElementById("stat-uptime").textContent   = `${avgUp}%`;
  document.getElementById("stat-incidents").textContent = openInc > 0 ? openInc : "None";
  document.getElementById("stat-incidents").style.color = openInc > 0 ? "var(--down)" : "";
  document.getElementById("stats-row").style.display   = "grid";
}

// ── Tag filter ────────────────────────────────────────────────────

let activeTag    = null;
let searchQuery  = "";
let allServers   = [];
let toolsDb      = {};
const openPanels = new Set();  // preserve which cards are expanded across re-renders

document.getElementById("search").addEventListener("input", e => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderServers(allServers);
});

function setupTagFilter(servers) {
  const tags = [...new Set(servers.flatMap(s => s.tags || []))].sort();
  const container = document.getElementById("tag-filter");
  container.innerHTML = "";
  if (!tags.length) return;

  [["", "all"], ...tags.map(t => [t, t])].forEach(([val, label]) => {
    const btn = document.createElement("button");
    btn.className = "tag-btn" + (val === (activeTag ?? "") ? " active" : "");
    btn.textContent = label;
    btn.addEventListener("click", () => {
      activeTag = val || null;
      container.querySelectorAll(".tag-btn").forEach(b => b.classList.toggle("active", b === btn));
      renderServers(allServers);
    });
    container.appendChild(btn);
  });
}

// ── Sparkline ─────────────────────────────────────────────────────

function buildSparkline(checks) {
  const wrap = document.createElement("div");
  wrap.className = "sparkline-wrap";

  const bar = document.createElement("div");
  bar.className = "sparkline";

  const padded = Array(Math.max(0, 90 - checks.length)).fill(null).concat(checks);

  padded.forEach(c => {
    const el = document.createElement("div");
    const st = c ? c.status : "unknown";
    el.className = `spark-bar ${st}`;
    if (c && c.latency_ms) {
      const h = Math.min(32, Math.max(5, Math.round(c.latency_ms / 30)));
      el.style.height = h + "px";
    } else {
      el.style.height = c ? "18px" : "5px";
    }
    if (c) {
      el.addEventListener("mouseenter", ev => showTooltip(ev, c));
      el.addEventListener("mousemove",  ev => moveTooltip(ev));
      el.addEventListener("mouseleave", hideTooltip);
    }
    bar.appendChild(el);
  });

  const lbl = document.createElement("span");
  lbl.className = "spark-label";
  lbl.textContent = "90 checks";

  wrap.appendChild(bar);
  wrap.appendChild(lbl);
  return wrap;
}

function showTooltip(ev, c) {
  const statusColor = c.status === "up" ? "var(--up)" : c.status === "down" ? "var(--down)" : "var(--degraded)";
  tooltip.innerHTML =
    `<span style="color:${statusColor};font-weight:600">${c.status.toUpperCase()}</span>` +
    ` &mdash; ${fmtDatetime(c.ts)}` +
    (c.latency_ms ? `<br><span style="color:var(--muted2)">${c.latency_ms}ms response time</span>` : "");
  tooltip.style.display = "block";
  moveTooltip(ev);
}
function moveTooltip(ev) {
  tooltip.style.left = (ev.clientX + 14) + "px";
  tooltip.style.top  = (ev.clientY - 40) + "px";
}
function hideTooltip() { tooltip.style.display = "none"; }

// ── Render servers ────────────────────────────────────────────────

function renderServers(servers) {
  const list = document.getElementById("server-list");
  list.innerHTML = "";
  const visible = servers.filter(s => {
    if (activeTag && !(s.tags || []).includes(activeTag)) return false;
    if (!searchQuery) return true;
    if (s.name.toLowerCase().includes(searchQuery)) return true;
    if (s.url.toLowerCase().includes(searchQuery))  return true;
    // Also match tool names / descriptions so a search like "browse" finds
    // servers that expose a tool with that name.
    const tools = (toolsDb[s.name] || {}).tools || [];
    if (tools.some(t =>
      (t.name || "").toLowerCase().includes(searchQuery) ||
      (t.description || "").toLowerCase().includes(searchQuery)
    )) return true;
    return false;
  });

  visible.forEach(s => {
    const cls  = s.status || "unknown";
    const card = document.createElement("div");
    card.className = `server-card ${cls}`;

    const tagsHtml = [
      ...(s.tags || []).map(t => `<span class="tag">${t}</span>`),
      s.transport ? `<span class="tag transport-tag">${s.transport}</span>` : "",
    ].join("");

    const top = document.createElement("div");
    top.className = "card-top";
    top.innerHTML = `
      <div class="status-pip ${cls}"></div>
      <div class="server-info">
        <div class="server-name">${s.name}</div>
        <div class="server-url"><a href="${s.url}" target="_blank" rel="noopener">${s.url}</a></div>
        ${tagsHtml ? `<div class="server-tags">${tagsHtml}</div>` : ""}
      </div>
      <div class="server-stats">
        ${s.latency_ms != null ? `<div class="latency" style="${latencyStyle(s.latency_ms)}">${s.latency_ms}<span style="font-size:.65em;font-weight:500;color:var(--muted2)">ms</span></div>` : ""}
        ${s.uptime_90  != null ? `<div class="uptime-pct">${s.uptime_90}% uptime</div>` : ""}
        ${s.error      ? `<div class="error-txt">${s.error}</div>` : ""}
        ${s.note       ? `<div class="note-txt">${s.note}</div>`   : ""}
      </div>
    `;

    card.appendChild(top);

    // Tools panel (only if we have tool data for this server)
    const entry = toolsDb[s.name];
    if (entry && Array.isArray(entry.tools) && entry.tools.length) {
      appendToolsUI(card, s.name, entry.tools);
    }

    if (s.recent_checks && s.recent_checks.length) {
      const sparkRow = document.createElement("div");
      sparkRow.className = "sparkline-row";
      sparkRow.appendChild(buildSparkline(s.recent_checks));
      card.appendChild(sparkRow);
    }

    list.appendChild(card);
  });
}

// ── Tools UI ──────────────────────────────────────────────────────

function appendToolsUI(card, serverName, tools) {
  // Badge goes into the stats column of the card-top
  const stats = card.querySelector(".server-stats");
  const badge = document.createElement("div");
  badge.className = "tool-count" + (openPanels.has(serverName) ? " open" : "");
  badge.innerHTML = `<span class="chev">▸</span> ${tools.length} tool${tools.length === 1 ? "" : "s"}`;
  stats.appendChild(badge);

  // Panel below card-top, above sparkline
  const panel = document.createElement("div");
  panel.className = "tools-panel" + (openPanels.has(serverName) ? " open" : "");

  const search = document.createElement("input");
  search.type = "search";
  search.className = "tools-search";
  search.placeholder = `Search ${tools.length} tools…`;
  search.autocomplete = "off";

  const listEl = document.createElement("div");
  const render = (q = "") => {
    const query = q.toLowerCase().trim();
    const filtered = query
      ? tools.filter(t =>
          (t.name || "").toLowerCase().includes(query) ||
          (t.description || "").toLowerCase().includes(query))
      : tools;
    listEl.innerHTML = "";
    if (!filtered.length) {
      listEl.innerHTML = `<div class="tools-empty">No matching tools.</div>`;
      return;
    }
    filtered.forEach(t => {
      const item = document.createElement("div");
      item.className = "tool-item";
      item.innerHTML = `
        <div class="tool-name">${t.name || "(unnamed)"}</div>
        ${t.description ? `<div class="tool-desc">${escapeHtml(t.description)}</div>` : ""}
      `;
      listEl.appendChild(item);
    });
  };

  search.addEventListener("input", e => render(e.target.value));
  render();

  panel.appendChild(search);
  panel.appendChild(listEl);

  badge.addEventListener("click", () => {
    const opening = !panel.classList.contains("open");
    panel.classList.toggle("open", opening);
    badge.classList.toggle("open", opening);
    if (opening) { openPanels.add(serverName); search.focus(); }
    else         { openPanels.delete(serverName); }
  });

  card.appendChild(panel);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Render incidents ──────────────────────────────────────────────

function makeIncidentItem(inc) {
  const ongoing  = !inc.resolved_at;
  const item     = document.createElement("div");
  item.className = `incident-item ${ongoing ? "ongoing" : "resolved"}`;
  const duration = inc.duration_min != null ? ` &mdash; lasted ${fmtDuration(inc.duration_min)}` : "";
  item.innerHTML = `
    <div>
      <div class="incident-server">${inc.name}</div>
      <div class="incident-time">
        Started ${fmtDatetime(inc.started_at)}
        ${inc.resolved_at ? `&rarr; ${fmtDatetime(inc.resolved_at)}${duration}` : ""}
      </div>
    </div>
    <div class="incident-badge ${ongoing ? "ongoing" : "resolved"}">
      ${ongoing ? "Ongoing" : "Resolved"}
    </div>
  `;
  return item;
}

function renderIncidents(incidentsData, serverNames) {
  const section     = document.getElementById("incidents-section");
  const ongoingEl   = document.getElementById("ongoing-list");
  const resolvedEl  = document.getElementById("resolved-list");
  const pastDetails = document.getElementById("past-incidents");

  ongoingEl.innerHTML  = "";
  resolvedEl.innerHTML = "";

  const all = [];
  for (const name of serverNames) {
    (incidentsData[name] || []).forEach(inc => all.push({ name, ...inc }));
  }
  all.sort((a, b) => (b.started_at > a.started_at ? 1 : -1));

  const ongoing  = all.filter(i => !i.resolved_at);
  const resolved = all.filter(i =>  i.resolved_at);

  section.style.display = "block";

  if (ongoing.length === 0) {
    ongoingEl.innerHTML = `
      <div class="all-clear">
        <span>✓</span> No current outages
      </div>`;
  } else {
    const list = document.createElement("div");
    list.className = "incident-list";
    ongoing.forEach(inc => list.appendChild(makeIncidentItem(inc)));
    ongoingEl.appendChild(list);
  }

  if (resolved.length > 0) {
    pastDetails.style.display = "block";
    resolved.slice(0, 20).forEach(inc => resolvedEl.appendChild(makeIncidentItem(inc)));
  } else {
    pastDetails.style.display = "none";
  }
}

// ── Main load ─────────────────────────────────────────────────────

async function load() {
  try {
    const [statusRes, incRes, toolsRes] = await Promise.all([
      fetch(STATUS_URL    + "?t=" + Date.now()),
      fetch(INCIDENTS_URL + "?t=" + Date.now()),
      fetch(TOOLS_URL     + "?t=" + Date.now()),
    ]);

    if (!statusRes.ok) throw new Error("status " + statusRes.status);
    const data      = await statusRes.json();
    const incidents = incRes.ok   ? await incRes.json()   : {};
    toolsDb         = toolsRes.ok ? await toolsRes.json() : {};

    allServers = data.servers || [];

    // Overall badge
    const downCount = allServers.filter(s => s.status === "down").length;
    const badge = document.getElementById("overall-badge");
    badge.style.display = "inline-flex";

    if (downCount === 0 && allServers.length > 0) {
      badge.className = "overall all-up";
      badge.innerHTML = `<span class="pip pulse"></span> All systems operational`;
    } else if (downCount > 0) {
      badge.className = "overall some-down";
      badge.innerHTML = `<span class="pip"></span> ${downCount} server${downCount > 1 ? "s" : ""} down`;
    } else {
      badge.className = "overall degraded";
      badge.innerHTML = `<span class="pip"></span> Degraded`;
    }

    document.getElementById("meta-line").textContent =
      `Last checked ${timeAgo(data.generated_at)} · ${fmtDatetime(data.generated_at)}`;

    renderStats(allServers, incidents);
    setupTagFilter(allServers);

    document.getElementById("loading").style.display = "none";
    const serverList = document.getElementById("server-list");
    serverList.style.display = "flex";
    renderServers(allServers);

    renderIncidents(incidents, allServers.map(s => s.name));

  } catch (err) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error-msg").style.display = "block";
    console.error(err);
  }
}

load();
setInterval(load, 60_000);
</script>
